version: "3.8"

services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-xe
    restart: unless-stopped
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PASSWORD: ${DB_ROOT_PASSWORD}
      APP_USER: ${DB_USER}
      APP_USER_PASSWORD: ${DB_PASSWORD}
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./backend/sql/01_schema.sql:/container-entrypoint-initdb.d/01_schema.sql
      - ./backend/sql/02_seed.sql:/container-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bank-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      oracle:
        condition: service_healthy
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/ssl:/app/ssl:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bank-frontend
    restart: unless-stopped
    ports:
      - "3002:443"
    depends_on:
      - backend
    volumes:
      - ./backend/ssl:/etc/nginx/ssl:ro

  monitor:
    build:
      context: ./monitor
      dockerfile: Dockerfile
    container_name: bank-monitor
    restart: unless-stopped
    ports:
      - "3003:80"
    environment:
      - VITE_BACKEND_URL=http://bank-backend:3000
    depends_on:
      - backend

volumes:
  oracle_data:
