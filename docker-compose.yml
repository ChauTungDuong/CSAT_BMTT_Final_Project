services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-xe
    profiles:
      - localdb
    restart: unless-stopped
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PASSWORD: ${DB_ROOT_PASSWORD}
      APP_USER: ${DB_USER}
      APP_USER_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./backend/sql/00_reset.sql:/container-entrypoint-initdb.d/00_reset.sql
      - oracle_data:/opt/oracle/oradata
      - ./backend/sql/01_schema.sql:/container-entrypoint-initdb.d/01_schema.sql
      - ./backend/sql/02_seed.sql:/container-entrypoint-initdb.d/02_seed.sql
      - ./backend/sql/04_migrate_user_profile.sql:/container-entrypoint-initdb.d/04_migrate_user_profile.sql
      - ./backend/sql/05_security_hardening.sql:/container-entrypoint-initdb.d/05_security_hardening.sql
      - ./backend/sql/06_card_normalization.sql:/container-entrypoint-initdb.d/06_card_normalization.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bank-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_HOST_PORT:-13001}:3000"
    env_file:
      - ./backend/.env
    environment:
      DB_CONNECTION_MODE: ${DB_CONNECTION_MODE:-cloud}
      WALLET_PATH: ${WALLET_CONTAINER_PATH:-/app/wallet}
    volumes:
      - ./backend/ssl:/app/ssl:ro
      - ${WALLET_HOST_PATH:-/opt/csat/wallet}:${WALLET_CONTAINER_PATH:-/app/wallet}:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bank-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_BIND_HOST:-127.0.0.1}:${FRONTEND_HOST_PORT:-13002}:80"
    depends_on:
      - backend

  nginx-proxy:
    build:
      context: ./nginx-proxy
      dockerfile: Dockerfile
    container_name: bank-nginx-proxy
    restart: unless-stopped
    ports:
      - "${NGINX_BIND_HOST:-0.0.0.0}:${NGINX_HTTP_HOST_PORT:-18080}:80"
      - "${NGINX_BIND_HOST:-0.0.0.0}:${NGINX_HTTPS_HOST_PORT:-18443}:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx-proxy/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend

volumes:
  oracle_data:
